                displayCtx.font = '12px "Press Start 2P", Courier';
                displayCtx.fillStyle = '#d4ceb0';
                displayCtx.fillText(i18n[currentLang].anomalyPurged, crtRes / 2, 258);
                displayCtx.globalAlpha = 1;
                displayCtx.shadowBlur = 0;
            } else if (elapsed < 3360) {
                const phase = clamp((elapsed - STAGE_TRANSITION_SWAP_MS) / (3360 - STAGE_TRANSITION_SWAP_MS), 0, 1);
                const flicker = Math.sin(tick * 0.83) > -0.28 ? 1 : 0.35;
                const bg = displayCtx.createLinearGradient(0, 0, 0, crtRes);
                bg.addColorStop(0, '#061421');
                bg.addColorStop(0.58, '#02070b');
                bg.addColorStop(1, '#000000');
                displayCtx.fillStyle = bg;
                displayCtx.fillRect(0, 0, crtRes, crtRes);
                drawTransitionNoise(displayCtx, 0.1 + (1 - phase) * 0.16);

                displayCtx.fillStyle = `rgba(120, 190, 255, ${0.04 + 0.05 * flicker})`;
                for (let y = 0; y < crtRes; y += 18) displayCtx.fillRect(0, y, crtRes, 1);

                displayCtx.shadowColor = '#8fd8ff';
                displayCtx.shadowBlur = 8;
                displayCtx.fillStyle = '#dff6ff';
                displayCtx.textAlign = 'left';
                displayCtx.textBaseline = 'top';
                displayCtx.font = '12px "Press Start 2P", Courier';
                const bootLines = [
                    'CRT POWER BUS: RESET',
                    i18n[currentLang].memoryCheck,
                    `SYNC: ${transitionLabel.toUpperCase()}`,
                    i18n[currentLang].stageOnline
                ];
                bootLines.forEach((line, index) => {
                    if (phase > index * 0.22) displayCtx.fillText(line, 38, 62 + index * 42);
                });

                const barX = 44;
                const barY = 344;
                const barW = crtRes - 88;
                displayCtx.shadowBlur = 0;
                displayCtx.strokeStyle = '#9ee6ff';
                displayCtx.lineWidth = 2;
                displayCtx.strokeRect(barX, barY, barW, 18);
                displayCtx.fillStyle = '#9ee6ff';
                displayCtx.fillRect(barX + 4, barY + 4, Math.max(0, (barW - 8) * phase), 10);
            } else {
                const phase = clamp((elapsed - 3360) / (STAGE_TRANSITION_MS - 3360), 0, 1);
                const flicker = Math.sin(tick * 0.7) > -0.45 ? 1 : 0.58;
                displayCtx.fillStyle = `rgba(7, 16, 12, ${0.6 + 0.4 * flicker})`;
                displayCtx.fillRect(0, 0, crtRes, crtRes);
                displayCtx.fillStyle = `rgba(212, 206, 176, ${0.06 + phase * 0.08})`;
                for (let y = 24; y < crtRes; y += 30) displayCtx.fillRect(42, y, crtRes - 84, 2);
                displayCtx.textAlign = 'center';
                displayCtx.textBaseline = 'middle';
                displayCtx.shadowColor = '#dff6ff';
                displayCtx.shadowBlur = 14;
                displayCtx.fillStyle = '#f3fdff';
                displayCtx.font = '22px "Press Start 2P", Courier';
                displayCtx.fillText(transitionLabel.toUpperCase(), crtRes / 2, 232);
                displayCtx.font = '11px "Press Start 2P", Courier';
                displayCtx.fillStyle = '#9ee6ff';
                displayCtx.fillText(i18n[currentLang].stageOnline, crtRes / 2, 278);
                displayCtx.shadowBlur = 0;
            }

            applyCRTOverlay(displayCtx, tick);
            displayCtx.restore();
            return true;
        }
        
        function drawGlobalScreenState(displayCtx, tick) {
            if (globalScreenState === 'TRANSITION') {
                return drawStageTransitionScreen(displayCtx, tick);
            }
            if (globalScreenState === 'CORRECT') {
                const elapsed = performance.now() - correctStateStartTime;
                
                // Complete black base
                displayCtx.fillStyle = '#000000';
                displayCtx.fillRect(0, 0, crtRes, crtRes);
	
                displayCtx.save();
                if (elapsed < 120) {
                    const bloom = 1 - elapsed / 120;
                    displayCtx.fillStyle = '#ffffff';
                    displayCtx.fillRect(0, 0, crtRes, crtRes);
                    displayCtx.fillStyle = `rgba(170, 220, 255, ${0.45 * bloom})`;
                    displayCtx.fillRect(0, 0, crtRes, crtRes);
                } else if (elapsed < 420) {
                    const phase = (elapsed - 120) / 300;
                    const height = Math.max(5, crtRes * Math.pow(1 - phase, 2.2));
                    const y = crtRes / 2 - height / 2;
                    const glow = 30 * (1 - phase) + 10;
                    displayCtx.shadowColor = '#eaf8ff';
                    displayCtx.shadowBlur = glow;
                    displayCtx.fillStyle = '#f8feff';
                    displayCtx.fillRect(0, y, crtRes, height);
                    displayCtx.fillStyle = '#ffffff';
                    displayCtx.fillRect(0, crtRes / 2 - 2, crtRes, 4);
                } else if (elapsed < 650) {
                    const phase = (elapsed - 420) / 230;
                    const width = Math.max(6, crtRes * Math.pow(1 - phase, 1.6));
                    displayCtx.shadowColor = '#d8f5ff';
                    displayCtx.shadowBlur = 28 * (1 - phase) + 8;
                    displayCtx.fillStyle = '#f8feff';
                    displayCtx.fillRect(crtRes / 2 - width / 2, crtRes / 2 - 2, width, 4);
                    displayCtx.beginPath();
                    displayCtx.arc(crtRes / 2, crtRes / 2, 12 * (1 - phase) + 2, 0, Math.PI * 2);
                    displayCtx.fill();
                } else if (elapsed < 960) {
                    if (tick % 17 === 0) {
                        displayCtx.fillStyle = 'rgba(180, 230, 255, 0.08)';
                        displayCtx.fillRect(0, crtRes / 2 - 1, crtRes, 2);
                    }
                } else {
                    const bootElapsed = elapsed - 960;
                    const bootProgress = clamp(bootElapsed / (CORRECT_SEQUENCE_MS - 1060), 0, 1);
                    const bg = displayCtx.createLinearGradient(0, 0, 0, crtRes);
                    bg.addColorStop(0, '#061421');
                    bg.addColorStop(0.55, '#02070b');
                    bg.addColorStop(1, '#000000');
                    displayCtx.fillStyle = bg;
                    displayCtx.fillRect(0, 0, crtRes, crtRes);

                    displayCtx.fillStyle = 'rgba(120, 190, 255, 0.05)';
                    for (let y = 0; y < crtRes; y += 18) displayCtx.fillRect(0, y, crtRes, 1);

                    displayCtx.shadowColor = '#8fd8ff';
                    displayCtx.shadowBlur = 8;
                    displayCtx.fillStyle = '#dff6ff';
                    displayCtx.textAlign = 'left';
                    displayCtx.textBaseline = 'top';
                    displayCtx.font = '14px "Press Start 2P", Courier';

                    const bootLines = [
                        { at: 0, text: 'CABIN BIOS v2.0' },
                        { at: 260, text: i18n[currentLang].rebooting },
                        { at: 620, text: i18n[currentLang].memoryCheck },
                        { at: 980, text: 'CRT BUS: ONLINE' },
                        { at: 1340, text: i18n[currentLang].anomalyPurged }
                    ];
                    bootLines.forEach((line, index) => {
                        if (bootElapsed >= line.at) {
                            displayCtx.fillText(line.text, 40, 54 + index * 42);
                        }
                    });

                    const barX = 40;
                    const barY = 330;
                    const barW = crtRes - 80;
                    displayCtx.shadowBlur = 0;
                    displayCtx.strokeStyle = '#9ee6ff';
                    displayCtx.lineWidth = 2;
                    displayCtx.strokeRect(barX, barY, barW, 18);
                    displayCtx.fillStyle = '#9ee6ff';
                    displayCtx.fillRect(barX + 4, barY + 4, Math.max(0, (barW - 8) * bootProgress), 10);

                    if (bootElapsed > 1420) {
                        const stageText = `${i18n[currentLang].stage} ${String(currentStage).padStart(2, '0')} ${i18n[currentLang].stageComplete}`;
                        const nextStage = currentStage + 1;
                        displayCtx.textAlign = 'center';
                        displayCtx.textBaseline = 'middle';
                        displayCtx.shadowColor = '#e8fbff';
                        displayCtx.shadowBlur = 12;
                        displayCtx.fillStyle = '#f3fdff';
                        displayCtx.font = '18px "Press Start 2P", Courier';
                        displayCtx.fillText(stageText, crtRes / 2, 392);
                        displayCtx.font = '13px "Press Start 2P", Courier';
                        displayCtx.fillStyle = '#9ee6ff';
                        if (nextStage <= totalStages) {
                            displayCtx.fillText(`${i18n[currentLang].loadingStage} ${String(nextStage).padStart(2, '0')}`, crtRes / 2, 424);
                        } else {
                            displayCtx.fillText(i18n[currentLang].runComplete, crtRes / 2, 424);
                        }

                        const blockCount = totalStages;
                        const blockW = 18;
                        const gap = 5;
                        const startX = crtRes / 2 - ((blockCount * blockW + (blockCount - 1) * gap) / 2);
                        for (let i = 0; i < blockCount; i++) {
                            const x = startX + i * (blockW + gap);
                            displayCtx.fillStyle = i < currentStage ? '#9ee6ff' : 'rgba(158, 230, 255, 0.18)';
                            displayCtx.fillRect(x, 456, blockW, 8);
                        }
                        displayCtx.shadowBlur = 0;
                    }

                    if (bootElapsed > 1900) {
                        displayCtx.shadowColor = '#e8fbff';
                        displayCtx.shadowBlur = 18;
                        displayCtx.fillStyle = '#f3fdff';
                        displayCtx.font = '28px "Press Start 2P", Courier';
                        displayCtx.textAlign = 'center';
                        displayCtx.textBaseline = 'middle';
                        displayCtx.fillText(i18n[currentLang].correct, crtRes / 2, 286);
                    }

                    displayCtx.globalAlpha = 0.95 + Math.sin(tick * 0.35) * 0.03;
                    applyCRTOverlay(displayCtx, tick);
                    displayCtx.globalAlpha = 1;
                }
                displayCtx.restore();
                return true;
            } else if (globalScreenState === 'EXPLODED') {
                // Dead static rendering
                displayCtx.drawImage(noiseCanvases[tick % 4], 0, 0, crtRes, crtRes);
                
                // Dark shattered glass lines
                displayCtx.strokeStyle = 'rgba(0, 0, 0, 0.8)';
                displayCtx.lineWidth = 4;
                displayCtx.beginPath();
                displayCtx.moveTo(crtRes/2, crtRes/2); displayCtx.lineTo(0, 0);
                displayCtx.moveTo(crtRes/2, crtRes/2); displayCtx.lineTo(crtRes, 100);
                displayCtx.moveTo(crtRes/2, crtRes/2); displayCtx.lineTo(100, crtRes);
                displayCtx.moveTo(crtRes/2, crtRes/2); displayCtx.lineTo(crtRes, crtRes);
                displayCtx.stroke();
                
                return true;
            } else if (globalScreenState === 'VICTORY') {
                displayCtx.fillStyle = '#0a0a0a';
                displayCtx.fillRect(0, 0, crtRes, crtRes);
                displayCtx.fillStyle = '#ffaa00';
                displayCtx.font = '36px "Press Start 2P", Courier';
                displayCtx.textAlign = 'center';
                displayCtx.textBaseline = 'middle';
                displayCtx.fillText(i18n[currentLang].safe, crtRes/2, crtRes/2);
                applyCRTOverlay(displayCtx, tick);
                return true;
            }
            return false;
        }

        // Animation function for the Left Monitor
        function updateLeftScreen(screenObj, deltaMs = NORMALIZED_TICK_MS) {
            const { logicCtx: ctx, logicCanvas: canvas, texture, displayCtx, channel } = screenObj;
            const w = canvas.width;
            const h = canvas.height;
            advanceScreenTime(screenObj, deltaMs);
            
            if (drawGlobalScreenState(displayCtx, screenObj.tick)) {
                texture.needsUpdate = true;
                return;
            }
            
            let audioActive = false;
            
            // --- DRAW GAME LOGIC (64x64) ---
            switch(channel) {
                case 0: // Channel 1: Tetris (Static)
                    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, w, h);
                    
                    const drawPiece = (x, y, shapes) => {
                        ctx.fillStyle = '#000';
                        shapes.forEach(([dx, dy]) => ctx.fillRect(x + dx*4, y + dy*4, 4, 4));
                    };
                    
                    drawPiece(4, 4, [[0,0], [1,0], [2,0], [3,0]]);  // I (horizontal)
                    drawPiece(24, 4, [[0,0], [1,0], [0,1], [1,1]]); // O
                    drawPiece(40, 4, [[1,0], [0,1], [1,1], [2,1]]); // T
                    drawPiece(4, 24, [[0,0], [1,0], [1,1], [2,1]]); // Z
                    drawPiece(24, 24, [[1,0], [2,0], [0,1], [1,1]]);// S
                    drawPiece(44, 24, [[0,0], [0,1], [1,1], [2,1]]);// J
                    drawPiece(12, 44, [[2,0], [0,1], [1,1], [2,1]]);// L
                    drawPiece(36, 40, [[0,0], [0,1], [0,2], [0,3]]);// I (vertical)
                    break;
                case 1: // Channel 2: Morse Code + Audio
                    ctx.fillStyle = '#120c08'; ctx.fillRect(0, 0, w, h);
                    ctx.fillStyle = '#d4ceb0';
                    
                    let speed = MORSE_BASE_UNIT_TICKS; 
                    let unit = Math.floor(screenObj.tick / speed); 
                    let currentPos = unit % morseSequence.length;
                    let isOn = morseSequence[currentPos];
                    
                    let unitsPerLine = 30; 
                    let blockW = 2; 
                    let blockH = 4; 
                    let startX = 2; 
                    let startY = 4; 
                    let lineSpacing = 6; 

                    for (let i = 0; i <= currentPos; i++) {
                        if (morseSequence[i]) {
                            let x = startX + (i % unitsPerLine) * blockW;
                            let y = startY + Math.floor(i / unitsPerLine) * lineSpacing;
                            ctx.fillRect(x, y, blockW, blockH);
                        }
                    }
                    
                    if ((screenObj.tick % speed) > (speed / 2)) {
                        let cursorX = startX + ((currentPos + 1) % unitsPerLine) * blockW;
                        let cursorY = startY + Math.floor((currentPos + 1) / unitsPerLine) * lineSpacing;
                        ctx.fillStyle = '#8f7448';
                        ctx.fillRect(cursorX, cursorY, blockW, blockH);
                    }
                    
                    if (isOn) audioActive = true;
                    break;
                case 2: // Channel 3: Bookshelf
                    ctx.fillStyle = '#1a0c07'; ctx.fillRect(0, 0, w, h);
                    ctx.fillStyle = '#2b160b'; 
                    ctx.fillRect(0, h/2 - 4, w, 4); 
                    ctx.fillRect(0, h - 4, w, 4);   
                    ctx.fillStyle = '#0a0502';
                    ctx.fillRect(0, h/2, w, 2); 

                    const drawHQBook = (x, y, bw, bh, colorBase, seed) => {
                        ctx.fillStyle = colorBase;
                        ctx.fillRect(x, y - bh, bw, bh);
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.25)';
                        ctx.fillRect(x, y - bh, 1, bh);
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                        ctx.fillRect(x + bw - 1, y - bh, 1, bh);
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                        ctx.fillRect(x, y - bh, bw, 1);
                        ctx.fillStyle = '#d4af37'; 
                        ctx.fillRect(x + 1, y - bh + 2, bw - 2, 1); 
                        ctx.fillRect(x + 1, y - 4, bw - 2, 1);      
                        ctx.fillStyle = '#a38421'; 
                        let textY = y - bh + 5;
                        while(textY < y - 6) {
                            if(((seed * 7 + textY) % 5 > 1) && bw > 2) {
                                ctx.fillRect(x + 1, textY, bw - 2, 1);
                            }
                            textY += 2;
                        }
                    };

                    const bookColors = ['#411', '#114', '#142', '#311', '#213', '#431', '#111', '#333', '#134', '#522', '#241', '#413'];
                    
                    let bx = 3;
                    for(let i=0; i<6; i++) {
                        let bh = 14 + (i * 5 % 10);
                        let bw = 4 + (i % 3) * 2;
                        drawHQBook(bx, h/2 - 4, bw, bh, bookColors[i], i);
                        bx += bw + 1 + (i % 2); 
                    }
                    bx = 2;
                    for(let i=6; i<12; i++) {
                        let bh = 16 + (i * 7 % 10);
                        let bw = 5 + (i % 2) * 2;
                        drawHQBook(bx, h - 4, bw, bh, bookColors[i], i);
                        bx += bw + 1;
                    }
                    break;
                case 3: // Channel 4: Binary String
                    ctx.fillStyle = '#d4ceb0'; 
                    ctx.fillRect(0, 0, w, h);
                    for(let i=0; i<50; i++) {
                        ctx.fillStyle = (i%2===0) ? '#c4be90' : '#e4deb0';
                        ctx.fillRect((i*13)%w, (i*17)%h, 2, 2);
                    }
                    break;
                case 4: // Channel 5: Words Grid
                    ctx.fillStyle = '#050005'; ctx.fillRect(0, 0, w, h);
                    break;
            }

            // --- DRAW TO HARDWARE DISPLAY AND APPLY CRT ---
            displayCtx.imageSmoothingEnabled = false;
            displayCtx.drawImage(canvas, 0, 0, crtRes, crtRes);

            if (channel === 3) {
                displayCtx.fillStyle = 'rgba(20, 20, 20, 0.8)'; 
                displayCtx.font = '24px "Press Start 2P", Courier';
                displayCtx.textAlign = 'center';
                displayCtx.textBaseline = 'middle';
                
                const binaryRows = buildBinaryRows(null);
                binaryRows.forEach((row) => {
                    displayCtx.fillText(row.text, row.x, row.y);
                });
            }
            
            if (channel === 4) {
                const colorHex = '#' + channelColorsLeft[channel].toString(16).padStart(6, '0');
                displayCtx.fillStyle = colorHex;
                displayCtx.font = '14px "Press Start 2P", Courier';
                displayCtx.textAlign = 'left';
                displayCtx.textBaseline = 'middle';
                displayCtx.shadowColor = colorHex;
                displayCtx.shadowBlur = 4;
                
                const wordsGrid = [
                    ["modern", "corner", "pattern", "return"],
                    ["little", "bottle", "letter", "million"],
                    ["clown", "global", "close", "clean"],
                    ["hello", "illusion", "parallel", "internal"]
                ];
                
                const startX = 25;
                const startY = 120;
                const colW = 115;
                const rowH = 90;
                
                for(let r=0; r<4; r++) {
                    for(let c=0; c<4; c++) {
                        displayCtx.fillText(wordsGrid[r][c], startX + c*colW, startY + r*rowH);
                    }
                }
                displayCtx.shadowBlur = 0; // reset
            }

            applyCRTOverlay(displayCtx, screenObj.tick);

            // Apply Audio safely
            if (gameActive && audioActive && globalScreenState === 'NORMAL') {
                morseGain.gain.setTargetAtTime(0.5, audioCtx.currentTime, 0.01);
            } else {
                morseGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.01);
            }

            texture.needsUpdate = true;
        }

        // Animation function for the Right Monitor
        function updateRightScreen(screenObj, time, deltaMs = NORMALIZED_TICK_MS) {
            const { displayCtx, texture, channel } = screenObj;
            advanceScreenTime(screenObj, deltaMs);
            
            const w = crtRes; 
            const h = crtRes;
            
            if (drawGlobalScreenState(displayCtx, screenObj.tick)) {
                texture.needsUpdate = true;
                return;
            }
            
            displayCtx.fillStyle = channel === 1 ? '#ffffff' : '#050005';
            displayCtx.fillRect(0, 0, w, h);
            displayCtx.shadowBlur = 0;

            switch(channel) {
                case 0: // Channel 1: Shapes
                    displayCtx.strokeStyle = '#fff';
                    displayCtx.fillStyle = '#fff';
                    displayCtx.lineWidth = 4;
                    displayCtx.font = '14px "Press Start 2P", Courier';
                    displayCtx.textAlign = 'center';

                    function drawShapeAndText(name, x, y, drawFn) {
                        displayCtx.beginPath();
                        drawFn();
                        displayCtx.stroke();
                        displayCtx.fillText(name, x, y + 70);
                    }

                    // Top Row
                    drawShapeAndText("TRIANGLE", 120, 150, () => {
                        displayCtx.moveTo(120, 100); displayCtx.lineTo(160, 170); displayCtx.lineTo(80, 170); displayCtx.closePath();
                    });
                    drawShapeAndText("CIRCLE", 256, 150, () => {
                        displayCtx.arc(256, 135, 40, 0, Math.PI*2);
                    });
                    drawShapeAndText("SQUARE", 392, 150, () => {
                        displayCtx.rect(352, 95, 80, 80);
                    });
                    
                    // Bottom Row
                    drawShapeAndText("STAR", 188, 350, () => {
                        let cx = 188, cy = 300, spikes = 5, outR = 45, inR = 20;
                        let rot = Math.PI / 2 * 3; let x, y, step = Math.PI / spikes;
                        displayCtx.moveTo(cx, cy - outR);
                        for (let i = 0; i < spikes; i++) {
                            x = cx + Math.cos(rot) * outR; y = cy + Math.sin(rot) * outR; displayCtx.lineTo(x, y); rot += step;
                            x = cx + Math.cos(rot) * inR; y = cy + Math.sin(rot) * inR; displayCtx.lineTo(x, y); rot += step;
                        }
                        displayCtx.closePath();
                    });
                    drawShapeAndText("RECTANGLE", 324, 350, () => {
                        displayCtx.rect(264, 280, 120, 60);
                    });
                    break;
                    
                case 1: // Channel 2: Periodic Table
                    const elements = [
                        {num: 1, sym: "H", name: "Hydrogen", mass: "1.00", color: "#ff8888"},
                        {num: 2, sym: "He", name: "Helium", mass: "4.00", color: "#88ccff"},
                        {num: 3, sym: "Li", name: "Lithium", mass: "6.94", color: "#dd88ff"},
                        {num: 4, sym: "Be", name: "Beryllium", mass: "9.01", color: "#ffbb55"},
                        {num: 5, sym: "B", name: "Boron", mass: "10.8", color: "#88ff88"},
                        {num: 6, sym: "C", name: "Carbon", mass: "12.0", color: "#ffff55"}
                    ];
                    
                    displayCtx.lineWidth = 3;
                    
                    for(let i=0; i<6; i++) {
                        let col = i % 3;
                        let row = Math.floor(i / 3);
                        let x = 36 + col * 150;
                        let y = 100 + row * 200;
                        
                        displayCtx.fillStyle = elements[i].color;
                        displayCtx.fillRect(x, y, 130, 160);

                        displayCtx.strokeStyle = '#222';
                        displayCtx.strokeRect(x, y, 130, 160);
                        
                        displayCtx.fillStyle = '#111'; 
                        
                        displayCtx.font = '12px "Press Start 2P", Courier';
                        displayCtx.textAlign = 'left';
                        displayCtx.fillText(elements[i].num, x + 10, y + 25);
                        
                        displayCtx.font = '10px "Press Start 2P", Courier';
                        displayCtx.textAlign = 'right';
                        displayCtx.fillText(elements[i].mass, x + 120, y + 25);
                        
                        displayCtx.font = '36px "Press Start 2P", Courier';
                        displayCtx.textAlign = 'center';
                        displayCtx.fillText(elements[i].sym, x + 65, y + 95);
                        
                        displayCtx.font = '10px "Press Start 2P", Courier';
                        displayCtx.fillText(elements[i].name, x + 65, y + 140);
                    }
                    break;
                    
                case 2: // Channel 3: Radar
                    displayCtx.strokeStyle = '#0f0';
                    displayCtx.lineWidth = 2;
                    
                    displayCtx.beginPath(); displayCtx.arc(w/2, h/2, 180, 0, Math.PI*2); displayCtx.stroke();
                    displayCtx.beginPath(); displayCtx.arc(w/2, h/2, 120, 0, Math.PI*2); displayCtx.stroke();
                    displayCtx.beginPath(); displayCtx.arc(w/2, h/2, 60, 0, Math.PI*2); displayCtx.stroke();
                    
                    displayCtx.beginPath(); displayCtx.moveTo(w/2, h/2 - 180); displayCtx.lineTo(w/2, h/2 + 180); displayCtx.stroke();
                    displayCtx.beginPath(); displayCtx.moveTo(w/2 - 180, h/2); displayCtx.lineTo(w/2 + 180, h/2); displayCtx.stroke();

                    let angle = screenObj.tick * 0.011; 
                    displayCtx.fillStyle = 'rgba(0, 255, 0, 0.3)';
                    displayCtx.beginPath();
                    displayCtx.moveTo(w/2, h/2);
                    displayCtx.arc(w/2, h/2, 180, angle - 0.5, angle);
                    displayCtx.fill();
                    displayCtx.beginPath();
                    displayCtx.moveTo(w/2, h/2);
                    displayCtx.lineTo(w/2 + Math.cos(angle)*180, h/2 + Math.sin(angle)*180);
                    displayCtx.stroke();

                    const dots = [
                        {a: 1.0, r: 100}, {a: 2.5, r: 150}, {a: 4.0, r: 80}, {a: 5.2, r: 160}, {a: 6.0, r: 50}
                    ];
                    
                    dots.forEach(dot => {
                        let da = (angle % (Math.PI*2));
                        let diff = da - dot.a;
                        if (diff < 0) diff += Math.PI*2;
                        
                        let alpha = 1.0 - (diff / (Math.PI / 2)); 
                        if (alpha < 0) alpha = 0; 
                        
                        if (alpha > 0) {
                            displayCtx.fillStyle = `rgba(0, 255, 0, ${alpha})`;
                            displayCtx.shadowColor = '#0f0';
                            displayCtx.shadowBlur = alpha * 15;
                            displayCtx.beginPath();
                            displayCtx.arc(w/2 + Math.cos(dot.a)*dot.r, h/2 + Math.sin(dot.a)*dot.r, 8, 0, Math.PI*2);
                            displayCtx.fill();
                            displayCtx.shadowBlur = 0;
                        }
                    });
                    break;
                    
                case 3: // Channel 4: Rubik's Cubes (6 faces)
                    const rubikColors = ['#f00', '#00f', '#0f0', '#fff', '#ff0', '#f80'];
                    const faceX = [76, 256, 436, 76, 256, 436];
                    const faceY = [150, 150, 150, 350, 350, 350];
                    
                    for(let i=0; i<6; i++) {
                        let cx = faceX[i] - 45;
                        let cy = faceY[i] - 45;
                        for(let row=0; row<3; row++) {
                            for(let col=0; col<3; col++) {
                                let colorIdx = (i * 7 + row * 3 + col * 5) % 6;
                                displayCtx.fillStyle = rubikColors[colorIdx];
                                displayCtx.fillRect(cx + col*30 + 2, cy + row*30 + 2, 26, 26);
                            }
                        }
                    }
                    break;
                    
                case 4: // Channel 5: Math Equations (Updates every 8 seconds)
                    displayCtx.fillStyle = '#0ff';
                    displayCtx.font = '14px "Press Start 2P", Courier'; 
                    displayCtx.textAlign = 'center';
                    displayCtx.textBaseline = 'middle';

                    let updateInterval = 8; 
                    let currentSet = Math.floor(time / updateInterval) % 5; 
                    let timeRemaining = Math.ceil(updateInterval - (time % updateInterval));

                    displayCtx.fillText(`UPDATING IN: ${timeRemaining}s`, w/2, 50);
                    displayCtx.fillText(`SET ${currentSet + 1}/5`, w/2, 80);

                    const ops = ['+', '-', '*', '/'];
                    
                    for(let r=0; r<3; r++) {
                        for(let c=0; c<3; c++) { 
                            let eqIdx = currentSet * 9 + r * 3 + c;
                            let num1 = (eqIdx * 13) % 20 + 1;
                            let num2 = (eqIdx * 17) % 10 + 1;
                            let opIdx = (eqIdx * 7) % 4;
                            let op = ops[opIdx];
                            let ans;
                            
                            if(op==='+') ans = num1 + num2;
                            if(op==='-') { ans = num1; num1 = ans + num2; }
                            if(op==='*') ans = num1 * num2;
                            if(op==='/') { ans = num1; num1 = num1 * num2; } 
                            
                            displayCtx.fillText(`${num1} ${op} ${num2} = ${ans}`, 85 + c * 171, 160 + r * 130);
                        }
                    }
                    break;
            }

            if (channel === 1) {
                displayCtx.fillStyle = 'rgba(0, 0, 0, 0.08)';
                for(let y=0; y<crtRes; y+=3) displayCtx.fillRect(0, y, crtRes, 1);

        function drawConfiguredTetrisPiece(ctx, piece, config = {}) {
            const fillStyle = config.fillStyle || '#000';
            const blocks = piece.blocks
                .filter((block, index) => !(config.removeIndices || []).includes(index))
                .concat(config.extraBlocks || []);

            ctx.save();
            if (config.rotation) {
                ctx.translate(piece.x + 8, piece.y + 8);
                ctx.rotate(config.rotation);
                ctx.translate(-(piece.x + 8), -(piece.y + 8));
            }

            blocks.forEach((block, index) => {
                let bx = piece.x + block[0] * 4;
                let by = piece.y + block[1] * 4;
                const key = `${block[0]},${block[1]}`;
                const offset = (config.blockOffsets && (config.blockOffsets[key] || config.blockOffsets[index])) || null;
                if (offset) {
                    bx += offset.x || 0;
                    by += offset.y || 0;
                }
                let bw = (config.blockWidths && config.blockWidths[key]) || config.blockWidth || 4;
                let bh = (config.blockHeights && config.blockHeights[key]) || config.blockHeight || 4;
                if (config.gap) {
                    bw = Math.max(1, bw - config.gap);
                    bh = Math.max(1, bh - config.gap);
                }
                ctx.fillStyle = fillStyle;
                ctx.fillRect(bx, by, bw, bh);
                if (config.edgeShift && index === 0) {
                    ctx.fillStyle = '#555';
                    ctx.fillRect(bx + 1, by, Math.max(1, bw - 1), 1);
                }
            });

            if (config.cutPixel) {
                ctx.clearRect(config.cutPixel.x, config.cutPixel.y, config.cutPixel.w || 1, config.cutPixel.h || 1);
            }
            ctx.restore();
        }

        function getSignalRuns(sequence, targetValue) {
            const runs = [];
            let start = null;
            for (let i = 0; i <= sequence.length; i++) {
                if (sequence[i] === targetValue && start === null) start = i;
                if ((sequence[i] !== targetValue || i === sequence.length) && start !== null) {
                    runs.push({ start, length: i - start });
                    start = null;
                }
            }
            return runs;
        }

        function wrapMorseWords(displayCtx, words, maxWidth) {
            const rows = [];
            let row = '';
            words.forEach((wordCode) => {
                const next = row ? `${row}   ${wordCode}` : wordCode;
                if (displayCtx.measureText(next).width > maxWidth && row) {
                    rows.push(row);
                    row = wordCode;
                } else {
                    row = next;
                }
            });
            if (row) rows.push(row);
            return rows;
        }

            ctx.fillRect(book.x + book.w - 1, book.y - book.h, 1, book.h);
            ctx.fillStyle = '#d4af37';

            const stripeYs = [];
            let stripeY = book.y - book.h + 5;
            const gap = book.stripeGap || 2;
            while (stripeY < book.y - 6) {
                stripeYs.push(stripeY + (book.verticalStripeShift || 0));
                stripeY += gap;

            if (book.extraStripe) stripeYs.push(book.y - 6);
            stripeYs.forEach((lineY, index) => {

                ctx.fillRect(book.x + 1 + (book.stripeXShift || 0), lineY, Math.max(1, book.w - 2), 1);

        function drawStarPath(ctx, cx, cy, spikes, outerRadius, innerRadius, unevenScale = 1) {
            let rot = Math.PI / 2 * 3;
            const step = Math.PI / spikes;
            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                const outR = i === 0 ? outerRadius * unevenScale : outerRadius;
                ctx.lineTo(cx + Math.cos(rot) * outR, cy + Math.sin(rot) * outR);
                rot += step;
                ctx.lineTo(cx + Math.cos(rot) * innerRadius, cy + Math.sin(rot) * innerRadius);
                rot += step;
            }
            ctx.closePath();
        }

        function drawRadarChannel(displayCtx, screenObj, anomaly) {
            displayCtx.fillStyle = '#050005';
            displayCtx.fillRect(0, 0, crtRes, crtRes);
            displayCtx.strokeStyle = '#0f0';
            displayCtx.lineWidth = 2;

            displayCtx.beginPath(); displayCtx.arc(crtRes / 2, crtRes / 2, 180, 0, Math.PI * 2); displayCtx.stroke();
            displayCtx.beginPath(); displayCtx.arc(crtRes / 2, crtRes / 2, 120, 0, Math.PI * 2); displayCtx.stroke();
            displayCtx.beginPath(); displayCtx.arc(crtRes / 2, crtRes / 2, 60, 0, Math.PI * 2); displayCtx.stroke();
            displayCtx.beginPath(); displayCtx.moveTo(crtRes / 2, crtRes / 2 - 180); displayCtx.lineTo(crtRes / 2, crtRes / 2 + 180); displayCtx.stroke();
            displayCtx.beginPath(); displayCtx.moveTo(crtRes / 2 - 180, crtRes / 2); displayCtx.lineTo(crtRes / 2 + 180, crtRes / 2); displayCtx.stroke();

            const dots = baseRadarDots.map((dot) => ({ ...dot, fadeMultiplier: 1, brightness: 1, delay: 0, cycleOffset: null }));
            let sweepSpeed = 0.011;

            switch (anomaly?.id) {
                case 'missing_dot': dots.splice(2, 1); break;
                case 'extra_dot': dots.push({ a: 3.3, r: 132, fadeMultiplier: 1, brightness: 1, delay: 0, cycleOffset: null }); break;
                case 'early_dot': dots[0].delay = -0.18; break;
                case 'outside_circle': dots[4].r = 205; break;
                case 'delayed_dot': dots[1].delay = 0.18; break;
                case 'slow_fade': dots[2].fadeMultiplier = 1.8; break;
                case 'off_grid_dot': dots[3].r = 137; break;
                case 'close_pair': dots[1].a = dots[0].a + 0.16; break;
                case 'dim_dot': dots[2].brightness = 0.45; break;
                case 'short_blink': dots[0].fadeMultiplier = 0.45; break;
                case 'sweep_speed_change': sweepSpeed = 0.0145; break;
                case 'wrong_cycle_dot': dots[4].cycleOffset = 1; break;
            }

            const angle = screenObj.tick * sweepSpeed;
            displayCtx.fillStyle = 'rgba(0, 255, 0, 0.3)';
            displayCtx.beginPath();
            displayCtx.moveTo(crtRes / 2, crtRes / 2);
            displayCtx.arc(crtRes / 2, crtRes / 2, 180, angle - 0.5, angle);
            displayCtx.fill();
            displayCtx.beginPath();
            displayCtx.moveTo(crtRes / 2, crtRes / 2);
            displayCtx.lineTo(crtRes / 2 + Math.cos(angle) * 180, crtRes / 2 + Math.sin(angle) * 180);
            displayCtx.stroke();

            dots.forEach((dot) => {
                const cycle = Math.floor(angle / (Math.PI * 2));
                if (dot.cycleOffset !== null && cycle % 2 !== dot.cycleOffset) return;
                let diff = (angle % (Math.PI * 2)) - dot.a - dot.delay;
                if (diff < 0) diff += Math.PI * 2;
                let alpha = 1 - (diff / ((Math.PI / 2) * dot.fadeMultiplier));
                if (alpha <= 0) return;
                alpha = clamp(alpha * dot.brightness, 0, 1);
                displayCtx.fillStyle = `rgba(0, 255, 0, ${alpha})`;
                displayCtx.shadowColor = '#0f0';
                displayCtx.shadowBlur = alpha * 15;
                displayCtx.beginPath();
                displayCtx.arc(crtRes / 2 + Math.cos(dot.a) * dot.r, crtRes / 2 + Math.sin(dot.a) * dot.r, 8, 0, Math.PI * 2);
                displayCtx.fill();
                displayCtx.shadowBlur = 0;
            });
        }

        function buildRubikFaces() {
            const faces = [];
            for (let face = 0; face < 6; face++) {
                const tiles = [];
                for (let row = 0; row < 3; row++) {
                    const tileRow = [];
                    for (let col = 0; col < 3; col++) {
                        tileRow.push(rubikPalette[(face + row + col) % rubikPalette.length]);
                    }
                    tiles.push(tileRow);
                }
                tiles[1][1] = rubikPalette[face];
                faces.push({ tiles, rowShift: null, gapAdjust: 0, tileRotation: null, missingTile: null, misalignedTile: null });
            }
            return faces;
        }

        function drawRubiksChannel(displayCtx, anomaly) {
            const faces = buildRubikFaces();
            switch (anomaly?.id) {
                case 'wrong_tile_color': faces[0].tiles[0][2] = '#8844ff'; break;
                case 'duplicate_centers': faces[4].tiles[1][1] = faces[0].tiles[1][1]; break;
                case 'missing_tile': faces[2].missingTile = { row: 2, col: 1 }; break;
                case 'misaligned_tile': faces[1].misalignedTile = { row: 0, col: 2, dx: 4, dy: 2 }; break;
                case 'swapped_edges': [faces[0].tiles[0][1], faces[0].tiles[1][0]] = [faces[0].tiles[1][0], faces[0].tiles[0][1]]; break;
                case 'impossible_corner': faces[3].tiles[0][0] = '#00ffff'; break;
                case 'shifted_row': faces[3].rowShift = { row: 1, dx: 2 }; break;
                case 'color_imbalance': faces[5].tiles[0][0] = faces[5].tiles[0][1] = faces[5].tiles[0][2] = rubikPalette[0]; break;
                case 'off_shade_tile': faces[2].tiles[2][2] = '#0ed40e'; break;
                case 'micro_spacing': faces[4].gapAdjust = 1; break;
                case 'tile_rotation': faces[0].tileRotation = { row: 1, col: 2, angle: 0.02 }; break;
                case 'twisted_piece': faces[1].tileRotation = { row: 0, col: 0, angle: -0.03 }; break;
            }

            const faceX = [76, 256, 436, 76, 256, 436];
            const faceY = [150, 150, 150, 350, 350, 350];

            displayCtx.fillStyle = '#050005';
            displayCtx.fillRect(0, 0, crtRes, crtRes);

            for (let i = 0; i < 6; i++) {
                const face = faces[i];
                const cx = faceX[i] - 45;
                const cy = faceY[i] - 45;
                for (let row = 0; row < 3; row++) {
                    const rowShift = face.rowShift && face.rowShift.row === row ? face.rowShift.dx : 0;
                    for (let col = 0; col < 3; col++) {
                        if (face.missingTile && face.missingTile.row === row && face.missingTile.col === col) continue;
                        const misaligned = face.misalignedTile && face.misalignedTile.row === row && face.misalignedTile.col === col ? face.misalignedTile : null;
                        const rotated = face.tileRotation && face.tileRotation.row === row && face.tileRotation.col === col ? face.tileRotation : null;
                        const tileX = cx + col * (30 + face.gapAdjust) + 2 + rowShift + (misaligned ? misaligned.dx : 0);
                        const tileY = cy + row * (30 + face.gapAdjust) + 2 + (misaligned ? misaligned.dy : 0);
                        displayCtx.save();
                        if (rotated) {
                            displayCtx.translate(tileX + 13, tileY + 13);
                            displayCtx.rotate(rotated.angle);
                            displayCtx.translate(-(tileX + 13), -(tileY + 13));
                        }
                        displayCtx.fillStyle = face.tiles[row][col];
                        displayCtx.fillRect(tileX, tileY, 26, 26);
                        displayCtx.restore();
                    }
                }
            }
        }

        function drawMathChannel(displayCtx, time, anomaly) {
            displayCtx.fillStyle = '#050005';

            displayCtx.fillStyle = '#0ff';

            let updateInterval = 8;
            let displayedTimeRemainingOffset = 0;
            if (anomaly?.id === 'updating_timer_inconsistent') {
                updateInterval = 9;
                displayedTimeRemainingOffset = 1;
            }

            const currentSet = Math.floor(time / updateInterval) % baseMathSets.length;
            const timeRemaining = Math.ceil(updateInterval - (time % updateInterval));
            const equations = baseMathSets[currentSet].slice();
            let styleIndex = -1;
            let yOffsetIndex = -1;

            switch (anomaly?.id) {
                case 'multiply_wrong_34': equations[0] = '7 x 5 = 34'; break;
                case 'addition_wrong_21': equations[1] = '13 + 9 = 21'; break;
                case 'division_wrong_5': equations[2] = '36 / 6 = 5'; break;
                case 'subtraction_off_one': equations[3] = '22 - 2 = 19'; break;
                case 'operator_wrong': equations[4] = '13 x 9 = 22'; break;
                case 'digit_swap': equations[5] = '19 x 3 = 75'; break;
                case 'repeated_changed_across_sets':
                    if (currentSet === 2) equations[3] = '22 - 2 = 21';
                    break;
                case 'formatting_space_missing': equations[8] = '112 / 8 =14'; break;
                case 'font_weight_diff': styleIndex = 4; break;
                case 'vertical_misalignment': yOffsetIndex = 6; break;
                case 'wrong_sequence_context': equations[7] = baseMathSets[(currentSet + baseMathSets.length - 1) % baseMathSets.length][7]; break;
            }

            displayCtx.fillText(`UPDATING IN: ${timeRemaining + displayedTimeRemainingOffset}s`, crtRes / 2, 44);
            displayCtx.fillText(`SET ${currentSet + 1}/5`, crtRes / 2, 72);

            const colXs = [92, 256, 420];

            equations.forEach((equation, index) => {

                displayCtx.fillText(equation, colXs[col], rowYs[row] + (index === yOffsetIndex ? 4 : 0));
            });
        }

        function wrapCanvasText(ctx, text, maxWidth) {
            const lines = [];
            String(text).split('\n').forEach((paragraph) => {
                if (!paragraph) {
                    lines.push('');
                    return;
                }
                let line = '';
                paragraph.split(' ').forEach((word) => {
                    const testLine = line ? `${line} ${word}` : word;
                    if (ctx.measureText(testLine).width > maxWidth && line) {
                        lines.push(line);
                        line = word;
                    } else {
                        line = testLine;
                    }
                });
                if (line) lines.push(line);
            });
            return lines;
        }

        function collapseText(text, maxLength) {

        function getSignalVisualPulse(lightDef, time) {
            if (!lightDef) return 0;
            let pulse = 1;
            if (lightDef.blinkCount) {
                const blinkGap = 0.34;
                const cycleLength = lightDef.blinkCount * blinkGap + 1.05;
                const cycle = (time + 0.08) % cycleLength;
                const blinkIndex = Math.floor(cycle / blinkGap);
                pulse = blinkIndex < lightDef.blinkCount && cycle % blinkGap < 0.18 ? 1 : 0.08;
            }
            if (lightDef.flicker) {
                const noise = Math.sin(time * 31.7) + Math.sin(time * 57.3 + 1.8) * 0.65 + Math.sin(time * 83.1 + 0.4) * 0.35;
                pulse *= noise > -0.25 ? 1 : 0.18;
            }
            return pulse;
        }

        function getSignalTransitionPower(time) {
            if (globalScreenState !== 'TRANSITION') return 1;
            const elapsed = getStageTransitionElapsed();
            if (elapsed < STAGE_TRANSITION_SWAP_MS) return Math.max(0, 1 - clamp(elapsed / 880, 0, 1));
            const boot = clamp((elapsed - STAGE_TRANSITION_SWAP_MS) / (STAGE_TRANSITION_MS - STAGE_TRANSITION_SWAP_MS), 0, 1);
            const flicker = Math.sin(time * 62) > -0.18 ? 1 : 0.24;
            return boot * flicker;
        }

            let power = getSignalTransitionPower(time);

            if (globalScreenState === 'VICTORY') power *= 0.35;
            const ambient = ambientLightEffect?.monitor ?? 1;

            signalPanelState.lenses.forEach((entry) => {
                const lightDef = activeLights.get(entry.color);
                const intensity = signalSpec ? getSignalVisualPulse(lightDef, time) * power * ambient : 0;
                const targetColor = intensity > 0.05 ? entry.onColor : 0x080706;
                entry.material.color.setHex(targetColor);
                entry.material.emissive.setHex(intensity > 0.05 ? entry.onColor : 0x000000);
                entry.material.emissiveIntensity = intensity * 1.85;
                entry.glow.material.opacity = intensity * 0.38;
                entry.point.intensity = intensity * 0.46 + lightningPulse * 0.05;
            });
