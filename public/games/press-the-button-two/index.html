        const deskLight = new THREE.SpotLight(0xb8ffbf, 1.05, 11, Math.PI / 4, 0.5, 2);
        deskLight.position.set(0, 3, 1);
        deskLight.target.position.set(0, 0.7, 0.6);
        deskLight.castShadow = true;
        deskLight.shadow.mapSize.width = 1024; deskLight.shadow.mapSize.height = 1024;
        deskLight.shadow.bias = -0.001; 
        scene.add(deskLight);
        scene.add(deskLight.target);

        const lightningLight = new THREE.DirectionalLight(0xd8eeff, 0);
        lightningLight.position.set(-4, 8, 3);
        scene.add(lightningLight);
        const stormState = {
            nextFlashAt: 5 + Math.random() * 8,
            flashStart: -999,
            flashDuration: 0.45,
            flashStrength: 1,
            lastPulse: 0
        };

        function scheduleNextLightning(time) {
            stormState.nextFlashAt = time + 10 + Math.random() * 18;
        }

        function triggerLightning(time) {
            stormState.flashStart = time;
            stormState.flashDuration = 0.32 + Math.random() * 0.26;
            stormState.flashStrength = 0.9 + Math.random() * 0.7;
            scheduleNextLightning(time);
            if (audioCtx.state === 'running') {
                const delay = 420 + Math.random() * 850;
                setTimeout(() => playThunderSound(stormState.flashStrength), delay);
            }
        }

        function updateLightning(time) {
            if (globalScreenState !== 'EXPLODED' && time >= stormState.nextFlashAt) {
                triggerLightning(time);
            }

            const age = time - stormState.flashStart;
            let pulse = 0;
            if (age >= 0 && age < stormState.flashDuration) {
                const falloff = Math.pow(1 - age / stormState.flashDuration, 2);
                const flicker = Math.sin(age * 95) > -0.15 ? 1 : 0.35;
                pulse = stormState.flashStrength * falloff * flicker;
            }
            stormState.lastPulse = pulse;
            lightningLight.intensity = pulse * 3.4;

            if (globalScreenState !== 'EXPLODED') {
                const fogPulse = clamp(pulse * 0.55, 0, 1);
                scene.fog.color.copy(baseFogColor).lerp(lightningFogColor, fogPulse);
                scene.background.copy(scene.fog.color);
            }
            return pulse;
        }

        function updateAmbientEvents() {
            if (!currentRun || !gameActive || globalScreenState !== 'NORMAL') return activeAmbientEvent;
            if (activeAmbientEvent) {
                if (runElapsedMs >= activeAmbientEvent.endMs) {
                    activeAmbientEvent = null;
                } else {
                    return activeAmbientEvent;
                }
            }

            const nextEvent = (currentRun.ambientEvents || []).find((event) => !event.triggered && runElapsedMs >= event.startMs);
            if (!nextEvent) return null;

            nextEvent.triggered = true;
            activeAmbientEvent = {
                type: nextEvent.type,
                startMs: runElapsedMs,
                endMs: runElapsedMs + nextEvent.durationMs
            };
            return activeAmbientEvent;
        }

        function getAmbientLightEffect(time) {
            if (!activeAmbientEvent || globalScreenState !== 'NORMAL') {
                return { room: 1, torch: 1, monitor: 1 };
            }
            if (activeAmbientEvent.type === AMBIENT_BLACKOUT) {
                return { room: 0.02, torch: 0, monitor: 0.42 };
            }
            if (activeAmbientEvent.type === AMBIENT_FLICKER_LOCKOUT) {
                const flickerOn = Math.sin(time * 48) + Math.sin(time * 91) * 0.45 > -0.15;
                const strength = flickerOn ? 1.08 : 0.08;
                return { room: strength, torch: strength, monitor: 0.55 + strength * 0.35 };
            }
            return { room: 1, torch: 1, monitor: 1 };
        }

        function isRunInteractionLocked() {
            return Boolean(gameActive && globalScreenState === 'NORMAL' && activeAmbientEvent && activeAmbientEvent.type === AMBIENT_FLICKER_LOCKOUT);
        }

        // --- GAME MECHANICS ---
        function updateYellowStageState() {
            const activeSpec = getCurrentStageSpec();
            const yellowActive = Boolean(gameActive && activeSpec && activeSpec.specialMode === 'yellow' && globalScreenState === 'NORMAL');
            yellowStageGroup.visible = yellowActive;
            yellowGlow.intensity = yellowActive ? 1.2 : 0;
            currentYawLimit = yellowActive ? REAR_YAW_LIMIT : NORMAL_YAW_LIMIT;
            if (typeof targetRotY !== 'undefined') targetRotY = clamp(targetRotY, -currentYawLimit, currentYawLimit);
        }

        function getStageLabel(stageNumber) {
            const stageLabel = (i18n[currentLang] && i18n[currentLang].stage) || i18n.en.stage;
            return `${stageLabel} ${stageNumber}`;
        }

        function getStageTransitionTitle(transition = stageTransition) {
            if (!transition) return getStageLabel(currentStage);
            if (transition.phase === 'complete') return `${i18n[currentLang].stage} ${i18n[currentLang].stageComplete}`;
            if (transition.titleOverride) return transition.titleOverride;
            if (transition.phase === 'boot') return getStageLabel(transition.targetStage || currentStage);
            return getStageLabel(transition.targetStage || currentStage);
        }

        function getStageTransitionSubtitle(transition = stageTransition) {
            if (!transition) return '';
            if (transition.intro) {
                if (transition.phase === 'boot') return i18n[currentLang].systemsRebooting;
                return i18n[currentLang].stageOnline;
            }
            if (transition.final) {
                if (transition.phase === 'complete') return getStageLabel(transition.completedStage);
                if (transition.phase === 'boot') return i18n[currentLang].systemsRebooting;
                return i18n[currentLang].runComplete;
            }
            if (transition.phase === 'complete') return getStageLabel(transition.completedStage);
            if (transition.phase === 'boot') return i18n[currentLang].systemsRebooting;
            return i18n[currentLang].loadingStage;
        }

        function updateStageTransitionOverlay() {
            const overlay = document.getElementById('stage-transition-overlay');
            const title = document.getElementById('stage-transition-title');
            const subtitle = document.getElementById('stage-transition-subtitle');
            if (!overlay || !title || !subtitle) return;

            if (!stageTransition) {
                overlay.classList.remove('text-visible', 'phase-powerdown', 'phase-complete', 'phase-next', 'phase-boot');
                return;
            }

            title.innerText = getStageTransitionTitle(stageTransition);
            subtitle.innerText = getStageTransitionSubtitle(stageTransition);
            overlay.classList.remove('phase-powerdown', 'phase-complete', 'phase-next', 'phase-boot', 'text-visible');
            overlay.classList.add(`phase-${stageTransition.phase || 'next'}`);
            if (stageTransition.textVisible) overlay.classList.add('text-visible');
        }

        function showStageTransitionOverlay() {
            const overlay = document.getElementById('stage-transition-overlay');
            if (!overlay) return;
            updateStageTransitionOverlay();
            overlay.classList.add('active');
            overlay.setAttribute('aria-hidden', 'false');
        }

        function hideStageTransitionOverlay() {
            const overlay = document.getElementById('stage-transition-overlay');
            if (!overlay) return;
            overlay.classList.remove('active', 'text-visible', 'phase-powerdown', 'phase-complete', 'phase-next', 'phase-boot');
            overlay.setAttribute('aria-hidden', 'true');
        }

        function getStageTransitionElapsed(now = performance.now()) {
            return stageTransition ? now - stageTransition.startMs : 0;
        }

        function getStageTransitionPhase(elapsed, transition = stageTransition) {
            if (!transition) return 'next';
            if (transition.intro) {
                if (elapsed < 700) return 'powerdown';
                if (elapsed < 2550) return 'next';
                return 'boot';
            }
            if (elapsed < 820) return 'powerdown';
            if (elapsed < 1850) return 'complete';
            if (elapsed < 3050) return 'next';
            return 'boot';
        }

        function isStageTransitionTextVisible(elapsed, transition = stageTransition) {
            if (!transition) return false;
            if (transition.intro) {
                return (elapsed >= 760 && elapsed < 2240) || elapsed >= 2740;
            }
            return (elapsed >= 900 && elapsed < 1680) ||
                (elapsed >= 1980 && elapsed < 2860) ||
                elapsed >= 3220;
        }

        function applyStageSwapIfNeeded() {
            if (!stageTransition || stageTransition.swapped || !stageTransition.targetStage) return;
            stageTransition.swapped = true;
            currentStage = stageTransition.targetStage;
            resetStageState();
            syncStagePresentation();
        }

        function updateStageTransition(now) {
            if (!stageTransition) return;
            const elapsed = getStageTransitionElapsed(now);
            stageTransition.phase = getStageTransitionPhase(elapsed, stageTransition);
            stageTransition.textVisible = isStageTransitionTextVisible(elapsed, stageTransition);

            if (elapsed >= STAGE_TRANSITION_SWAP_MS) {
                applyStageSwapIfNeeded();
            }

            updateStageTransitionOverlay();
        }

        function beginStageTransition(options = {}, onComplete) {
            window.clearTimeout(stageTransitionTimer);
            const token = ++stageTransitionToken;
            const transitionOptions = typeof options === 'object' ? options : { targetStage: options };
            const startedAt = performance.now();
            stageTransition = {
                token,
                startMs: startedAt,
                completedStage: transitionOptions.completedStage || currentStage,
                targetStage: transitionOptions.targetStage || null,
                titleOverride: transitionOptions.titleOverride || null,
                final: Boolean(transitionOptions.final),
                intro: Boolean(transitionOptions.intro),
                swapped: !transitionOptions.targetStage,
                phase: 'powerdown',
                textVisible: false,
                onComplete
            };
            globalScreenState = 'TRANSITION';
            isProcessingAction = true;
            lastAnimationNow = startedAt;
            showStageTransitionOverlay();

            stageTransitionTimer = window.setTimeout(() => {
                if (token !== stageTransitionToken) return;
                applyStageSwapIfNeeded();
                hideStageTransitionOverlay();
                if (globalScreenState === 'TRANSITION') {
                    globalScreenState = 'NORMAL';
                }
                isProcessingAction = false;
                lastAnimationNow = performance.now();
                const completed = stageTransition;
                stageTransition = null;
                if (completed && typeof completed.onComplete === 'function') completed.onComplete();
                syncStagePresentation();
            }, STAGE_TRANSITION_MS);
        }

        function resetStageState() {
            screen1Obj.channel = 0;
            screen2Obj.channel = 1;
            isTabletInHand = false;
            isNoteInHand = false;
            tabletPageMode = 'CURRENT';
            notePageIndex = Math.floor((getCurrentStageSpec()?.anomalyCount || 0) / NOTE_PAGE_SIZE);
            currentYawLimit = NORMAL_YAW_LIMIT;
            if (typeof targetRotY !== 'undefined') targetRotY = 0;
            if (typeof targetRotX !== 'undefined') targetRotX = 0;
            setZoomedMonitor(null);
            camera.rotation.y = 0;
            camera.rotation.x = 0;
            camera.position.x = 0;
            camera.position.z = 2.2;
            yellowStageGroup.visible = false;
            yellowGlow.intensity = 0;
            lastDisplayTime = -1;
        }

        function openMenuOverlay() {
            updateMenuCopy();
            const menu = document.getElementById('main-menu');
            menu.style.display = 'flex';
            setTimeout(() => { menu.style.opacity = '1'; }, 10);
            document.getElementById('btn-open-menu').style.display = 'none';
        }

        function recordSolvedStage(stageSpec, pressedType) {
            if (!currentRun) return;
            currentRun.history.push({
                stage: stageSpec.stage,
                anomalyCount: stageSpec.anomalyCount,
                riddleId: stageSpec.riddleId,
                pressedButton: pressedType,
                signalSpec: stageSpec.signalSpec || null,
                usesSignal: Boolean(stageSpec.usesSignal)
            });
        }

        function triggerWinSequence(stageSpec, pressedType) {
            playSuccessSound();
            recordSolvedStage(stageSpec, pressedType);
            activeAmbientEvent = null;

            const nextStage = currentStage + 1;
            if (nextStage > totalStages) {
                beginStageTransition({
                    completedStage: currentStage,
                    titleOverride: i18n[currentLang].runComplete,
                    final: true
                }, () => {
                    rainAudio.pause();
                    globalScreenState = 'VICTORY';
                    menuMode = MENU_WIN;
                    hasStarted = false;
                    gameActive = false;
                    isProcessingAction = false;
                    victoryCodeUnlocked = true;
                    openMenuOverlay();
                });
                return;
            }

            beginStageTransition({
                completedStage: currentStage,
                targetStage: nextStage
            });
        }

        function createExplosionParticles() {
            const geom = new THREE.BoxGeometry(0.05, 0.05, 0.05);
            const mat = new THREE.MeshBasicMaterial({color: 0xff4400});
            // Left Monitor Particles
            for(let i=0; i<30; i++) {
                const p = new THREE.Mesh(geom, mat);
                p.position.set(-0.55, 0.75, 0.3);
                p.userData = { vx: (Math.random() - 0.5) * 0.2, vy: (Math.random()) * 0.2, vz: (Math.random()) * 0.2 };
                scene.add(p);
                explosionParticles.push(p);
            }
            // Right Monitor Particles
            for(let i=0; i<30; i++) {
                const p = new THREE.Mesh(geom, mat);
                p.position.set(0.65, 0.75, 0.35);
                p.userData = { vx: (Math.random() - 0.5) * 0.2, vy: (Math.random()) * 0.2, vz: (Math.random()) * 0.2 };
                scene.add(p);
                explosionParticles.push(p);
            }
        }

        function triggerLoseSequence() {
            playExplosionSound();
            globalScreenState = 'EXPLODED';
            
            const origFog = scene.fog.color.getHex();
            scene.fog.color.setHex(0xffffff);
            setTimeout(() => scene.fog.color.setHex(origFog), 100);

            createExplosionParticles();

            setTimeout(() => {
                rainAudio.pause();
                gameActive = false;
                hasStarted = false;
                menuMode = MENU_LOSE;
                openMenuOverlay();
                globalScreenState = 'NORMAL';
                isProcessingAction = false;
                syncStagePresentation();
            }, 4000);
        }

        function checkAnswer(pressedType) {
            const stageSpec = getCurrentStageSpec();
            if (!stageSpec || !gameActive || globalScreenState !== 'NORMAL' || isProcessingAction) return;
            isProcessingAction = true;
            if (stageSpec.expectedButton === pressedType) {
                triggerWinSequence(stageSpec, pressedType);
            } else {
                triggerLoseSequence();
            }
        }

        // --- INTERACTIONS ---
        let targetRotX = 0, targetRotY = 0, mouseX = 0, mouseY = 0;
        let zoomedMonitor = null; // null | 'left' | 'right'
        const ZOOM_CAM = {
            left:  { x: -0.24, z: 1.35, rotY:  0.2, rotX: 0.08 },
            right: { x:  0.32, z: 1.35, rotY: -0.22, rotX: 0.08 }
        };

        function syncZoomButtons() {
            const leftButton = document.getElementById('btn-zoom-left');
            const rightButton = document.getElementById('btn-zoom-right');
            if (leftButton) leftButton.setAttribute('aria-pressed', zoomedMonitor === 'left' ? 'true' : 'false');
            if (rightButton) rightButton.setAttribute('aria-pressed', zoomedMonitor === 'right' ? 'true' : 'false');
        }

        function resetLookTarget() {
            mouseX = 0;
            mouseY = 0;
            targetRotX = 0;
            targetRotY = 0;
        }

        function setZoomedMonitor(target) {
            zoomedMonitor = target;
            if (!target) resetLookTarget();
            syncZoomButtons();
        }

        function handleInteraction(clickMouse) {
            if (isRunInteractionLocked()) return;

            raycaster.setFromCamera(clickMouse, camera);

            const btnIntersects = raycaster.intersectObjects(interactableButtons, true);
            const clickedButton = btnIntersects.length > 0 ? btnIntersects[0].object : null;

            if (isTabletInHand || isNoteInHand) {
                if (isTabletInHand && clickedButton && clickedButton.userData.isTablet) {
                    tabletPageMode = tabletPageMode === 'CURRENT' ? 'LOG' : 'CURRENT';
                    updateTabletScreen();
                    return;
                }
                if (isNoteInHand && clickedButton && clickedButton.userData.isNote) {
                    notePageIndex = (notePageIndex + 1) % getNotePageCount();
                    updateNoteScreen();
                    return;
                }
                isTabletInHand = false;
                isNoteInHand = false;
                syncStagePresentation();
                return;
            }

            const monitorIntersects = raycaster.intersectObjects(interactableMonitors);
            if (monitorIntersects.length > 0 && globalScreenState === 'NORMAL') {
                const data = monitorIntersects[0].object.userData;
                data.screenObj.channel = (data.screenObj.channel + 1) % 5;
                return;
            }

            if (zoomedMonitor) {
                setZoomedMonitor(null);
                return;
            }

            if (clickedButton) {
                if (clickedButton.userData.isTablet) {
                    isTabletInHand = true;
                    isNoteInHand = false;
                    tabletPageMode = 'CURRENT';
                    updateTabletScreen();
                    return;
                }
                if (clickedButton.userData.isNote) {
                    isNoteInHand = true;
                    isTabletInHand = false;
                    notePageIndex = Math.floor((getCurrentStageSpec()?.anomalyCount || 0) / NOTE_PAGE_SIZE);
                    updateNoteScreen();
                    return;
                }
                if (clickedButton.userData.isButton) {
                    if (clickedButton.userData.buttonType === BUTTON_YELLOW && !yellowStageGroup.visible) return;
                    clickedButton.position.y = clickedButton.userData.pressY;
                    setTimeout(() => { clickedButton.position.y = clickedButton.userData.originalY; }, 150);
                    checkAnswer(clickedButton.userData.buttonType);
                }
            }
        }

        function isGameUiEventTarget(target) {
            return !!(target && target.closest && target.closest('#game-actions, #main-menu, #tutorial-overlay, #fullscreen-toast, #stage-transition-overlay, #rotate-phone-overlay'));
        }

        function normalizedPointerFromClient(clientX, clientY) {
            const size = getGameViewportSize();
            return new THREE.Vector2((clientX / size.width) * 2 - 1, -(clientY / size.height) * 2 + 1);
        }

        function updateLookTargetFromClient(clientX, clientY) {
            const pointer = normalizedPointerFromClient(clientX, clientY);
            mouseX = pointer.x;
            mouseY = pointer.y;
            targetRotY = clamp(-mouseX * currentYawLimit, -currentYawLimit, currentYawLimit);
            targetRotX = clamp(mouseY * 0.3, -0.35, 0.35);
        }

        document.addEventListener('mousemove', (e) => {
            if (!gameActive || isGameUiEventTarget(e.target)) return; 
            updateLookTargetFromClient(e.clientX, e.clientY);
        });

        document.addEventListener('mousedown', (e) => {
            if (!gameActive || isGameUiEventTarget(e.target)) return; 
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const clickMouse = normalizedPointerFromClient(e.clientX, e.clientY);
            handleInteraction(clickMouse);
        });

        // Mobile Touch Support
        document.addEventListener('touchmove', (e) => {
            if (!gameActive) return;
            if (isGameUiEventTarget(e.target)) return;
            e.preventDefault(); 
            
            const touch = e.touches[0];
            if (!touch) return;
            updateLookTargetFromClient(touch.clientX, touch.clientY);
        }, { passive: false });

        document.addEventListener('touchstart', (e) => {
            if (!gameActive || isGameUiEventTarget(e.target)) return;
            e.preventDefault();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const touch = e.touches[0];
            if (!touch) return;
            const clickMouse = normalizedPointerFromClient(touch.clientX, touch.clientY);
            handleInteraction(clickMouse);
        }, { passive: false });

        let viewportResizeFrame = 0;
        function queueResizeGameViewport() {
            window.cancelAnimationFrame(viewportResizeFrame);
            viewportResizeFrame = window.requestAnimationFrame(() => {
                resizeGameViewport();
                syncFullscreenButton();
                syncRotatePhoneOverlay();
            });
        }

        window.addEventListener('resize', queueResizeGameViewport);
        window.addEventListener('orientationchange', () => {
            window.setTimeout(queueResizeGameViewport, 80);
        });
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', queueResizeGameViewport);
            window.visualViewport.addEventListener('scroll', queueResizeGameViewport);
        }

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const now = performance.now();
            const deltaMs = now - lastAnimationNow;
            lastAnimationNow = now;
            const time = clock.getElapsedTime();

            if (globalScreenState === 'TRANSITION') {
                updateStageTransition(now);
            }

            if (gameActive && hasStarted && globalScreenState === 'NORMAL') {
                runElapsedMs = Math.min(RUN_DURATION_MS, runElapsedMs + deltaMs);
            }

            const timeLeft = Math.max(0, Math.ceil((RUN_DURATION_MS - runElapsedMs) / 1000));
            if (timeLeft !== lastDisplayTime) {
                updateTimerTexture(timeLeft);
                lastDisplayTime = timeLeft;
            }
            if (timeLeft === 0 && gameActive && globalScreenState === 'NORMAL' && !isProcessingAction) {
                triggerLoseSequence();
            }

            updateYellowStageState();
            updateAmbientEvents();
            const ambientLightEffect = getAmbientLightEffect(time);
            const lightningPulse = updateLightning(time);
            updateSignalPanel(time, ambientLightEffect, lightningPulse);

            const _zc = zoomedMonitor ? ZOOM_CAM[zoomedMonitor] : null;
            const _tRotY = _zc ? _zc.rotY : clamp(targetRotY, -currentYawLimit, currentYawLimit);
            const _tRotX = _zc ? _zc.rotX : targetRotX;
            camera.rotation.y += (_tRotY - camera.rotation.y) * 0.07;
            camera.rotation.x += (_tRotX - camera.rotation.x) * 0.07;
            camera.position.x += ((_zc ? _zc.x : 0)   - camera.position.x) * 0.07;
            camera.position.z += ((_zc ? _zc.z : 2.2) - camera.position.z) * 0.07;
            camera.position.y = 1.1 + Math.sin(time * 1.5) * 0.015;

            // Handle Tablet Position
            if (isTabletInHand) {
                const targetPos = new THREE.Vector3(0, -0.05, -0.35);
                targetPos.applyMatrix4(camera.matrixWorld);
                const targetQuat = camera.quaternion.clone().multiply(new THREE.Quaternion().setFromEuler(new THREE.Euler(Math.PI / 2 - 0.1, 0, 0)));
                tabletGroup.position.lerp(targetPos, 0.15);
                tabletGroup.quaternion.slerp(targetQuat, 0.15);
            } else {
                tabletGroup.position.lerp(tabletDeskPos, 0.15);
                tabletGroup.quaternion.slerp(tabletDeskQuat, 0.15);
            }

            // Handle Note Position
            if (isNoteInHand) {
                const targetPos = new THREE.Vector3(0, -0.05, -0.35);
                targetPos.applyMatrix4(camera.matrixWorld);
                // Rotate note perfectly towards camera
                const targetQuat = camera.quaternion.clone().multiply(new THREE.Quaternion().setFromEuler(new THREE.Euler(Math.PI / 2 - 0.1, 0, 0)));
                noteGroup.position.lerp(targetPos, 0.15);
                noteGroup.quaternion.slerp(targetQuat, 0.15);
            } else {
                noteGroup.position.lerp(noteDeskPos, 0.15);
                noteGroup.quaternion.slerp(noteDeskQuat, 0.15);
            }

            // Handle Explosion Particles
            for (let i = explosionParticles.length - 1; i >= 0; i--) {
                const p = explosionParticles[i];
                p.position.x += p.userData.vx;
                p.position.y += p.userData.vy;
                p.position.z += p.userData.vz;
                p.userData.vy -= 0.01; // Gravity
                if(p.position.y < 0) {
                    scene.remove(p);
                    explosionParticles.splice(i, 1);
                }
            }

            updateLeftScreen(screen1Obj, deltaMs);
            updateRightScreen(screen2Obj, runElapsedMs / 1000, deltaMs);

            // Handle Lighting Overrides
            if (globalScreenState === 'TRANSITION') {
                const transitionElapsed = getStageTransitionElapsed(now);
                const powerDown = transitionElapsed < 880 ? 1 - clamp(transitionElapsed / 880, 0, 1) : 0;
                const bootUp = transitionElapsed > STAGE_TRANSITION_SWAP_MS
                    ? clamp((transitionElapsed - STAGE_TRANSITION_SWAP_MS) / (STAGE_TRANSITION_MS - STAGE_TRANSITION_SWAP_MS), 0, 1)
                    : 0;
                const rebootFlicker = transitionElapsed > STAGE_TRANSITION_SWAP_MS
                    ? (Math.sin(time * 52) > -0.15 ? 1 : 0.45)
                    : 1;
                const transitionRoom = 0.24 + powerDown * 0.34 + bootUp * 0.28 * rebootFlicker;
                deskLight.color.setHex(0xb8ffbf);
                deskLight.intensity = transitionRoom + lightningPulse * 0.9;
                torches.forEach(t => t.light.intensity = Math.max(0.2, t.baseIntensity * (0.34 + bootUp * 0.22) + lightningPulse * 0.25));
            } else if (globalScreenState === 'CORRECT') {
                const elapsed = now - correctStateStartTime;
                if (elapsed < 800) {
                    deskLight.intensity = 0.06 + lightningPulse * 1.15; // Pitch black room while off
                    torches.forEach(t => t.light.intensity = 0.12 + lightningPulse * 0.35);
                } else {
                    deskLight.intensity = 0.28 + lightningPulse * 1.15; // Dimmed room during reboot
                    torches.forEach(t => t.light.intensity = 0.42 + lightningPulse * 0.35);
                }
            } else if (globalScreenState === 'EXPLODED') {
                deskLight.color.setHex(0xff0000);
                deskLight.intensity = (time * 10) % 2 < 1 ? 0.8 : 0; // Flashing Red
                torches.forEach(t => t.light.intensity = 0);
            } else {
                deskLight.color.setHex(0xb8ffbf);
                deskLight.intensity = (0.9 + Math.random() * 0.18) * ambientLightEffect.room + lightningPulse * 1.15;
                torches.forEach(t => {
                    t.light.intensity = Math.max(0, (t.baseIntensity + (Math.random() * 0.42 - 0.16)) * ambientLightEffect.torch + lightningPulse * 0.35);
                });
            }

            interactableMonitors.forEach(monitor => {
                const data = monitor.userData;
                const palette = data.isLeft ? channelColorsLeft : channelColorsRight;
                const nameArray = data.isLeft ? i18n[currentLang].monitorNamesLeft : i18n[currentLang].monitorNamesRight;
                const currentChannel = data.screenObj.channel;
                const channelTitle = `CH. ${currentChannel + 1} - ${nameArray[currentChannel]}`;
                const titleKey = `${currentLang}:${currentChannel}:${channelTitle}`;
                
                if (data.lastChannel !== currentChannel || data.lastTitleKey !== titleKey) {
                    data.lastChannel = currentChannel;
                    data.lastTitleKey = titleKey;
                    const ctx = data.titleCtx;
                    const colorHex = '#' + palette[currentChannel].toString(16).padStart(6, '0');
                    
                    ctx.fillStyle = '#111';
                    ctx.fillRect(0, 0, 256, 64);
                    
                    drawMonitorChannelTitle(ctx, channelTitle, colorHex);
                    
                    ctx.strokeStyle = '#222';
                    ctx.lineWidth = 4;
                    ctx.strokeRect(0, 0, 256, 64);
                    
                    data.titleTex.needsUpdate = true;
                    data.titleMat.emissive.setHex(palette[currentChannel]);
                }

                // Handle Monitor Lights dynamically based on global state
                if (globalScreenState === 'TRANSITION') {
                    const transitionElapsed = getStageTransitionElapsed(now);
                    const powerDown = transitionElapsed < 880 ? 1 - clamp(transitionElapsed / 880, 0, 1) : 0;
                    const bootUp = transitionElapsed > STAGE_TRANSITION_SWAP_MS
                        ? clamp((transitionElapsed - STAGE_TRANSITION_SWAP_MS) / (STAGE_TRANSITION_MS - STAGE_TRANSITION_SWAP_MS), 0, 1)
                        : 0;
                    const rebootFlicker = transitionElapsed > STAGE_TRANSITION_SWAP_MS
                        ? (Math.sin(time * 58 + currentChannel) > -0.22 ? 1 : 0.18)
                        : 1;
                    const glow = powerDown * 0.28 + bootUp * rebootFlicker * 0.72;
                    const transitionColor = transitionElapsed > STAGE_TRANSITION_SWAP_MS ? 0x88ccff : palette[currentChannel];
                    data.material.emissive.setHex(glow > 0.04 ? transitionColor : 0x000000);
                    data.titleMat.emissive.setHex(glow > 0.08 ? transitionColor : 0x000000);
                    data.light.color.setHex(transitionColor);
                    data.light.intensity = glow + lightningPulse * 0.14;
                } else if (globalScreenState === 'EXPLODED') {
                    data.material.emissive.setHex(0x000000);
                    data.light.intensity = 0;
	                } else if (globalScreenState === 'CORRECT') {
	                    const elapsed = now - correctStateStartTime;
	                    if (elapsed < 800) {
	                        // Monitor is physically off
	                        data.material.emissive.setHex(0x000000);
	                        data.light.intensity = lightningPulse * 0.2;
	                    } else {
	                        // Monitor is booting up (Pale cool blue glow)
	                        data.material.emissive.setHex(0x88ccff);
	                        data.light.color.setHex(0x88ccff);
	                        data.light.intensity = 0.55 + Math.random() * 0.12 + lightningPulse * 0.18;
	                    }
	                } else if (globalScreenState === 'VICTORY') {
	                    data.material.emissive.setHex(0xffaa00);
	                    data.light.color.setHex(0xffaa00);
	                    data.light.intensity = 0.65 + lightningPulse * 0.2;
	                } else {
	                    const targetColor = new THREE.Color(palette[currentChannel]);
	                    data.material.emissive.lerp(targetColor, 0.05);
	                    data.light.color.lerp(targetColor, 0.05);
	                    data.light.intensity = (0.45 + Math.random() * 0.25) * ambientLightEffect.monitor + lightningPulse * 0.2; 
	                }
            });

            if (Math.random() > 0.99) {
                eyes.visible = false;
                setTimeout(() => { eyes.visible = true; }, 100);
            }
            eyes.position.x = -2 + Math.sin(time * 0.2) * 0.5;

            renderer.render(scene, camera);
        }

        window.onload = animate;

    </script>
</body>
</html>
